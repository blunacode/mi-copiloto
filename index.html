<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copiloto de Ventas AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans min-h-screen flex items-center justify-center p-4">

    <div class="max-w-2xl w-full bg-gray-800 p-8 rounded-2xl shadow-2xl border border-gray-700">
        <h1 class="text-2xl font-bold mb-2 text-blue-400">🚀 Copiloto de Ventas</h1>
        <p class="text-gray-400 mb-6 text-sm">Pega la conversación y obtén la respuesta perfecta basada en tus 14 años de experiencia.</p>

        <div class="mb-4">
            <input type="password" id="apiKey" placeholder="Pega tu OpenAI API Key aquí" 
            class="w-full p-2 text-xs bg-gray-700 border border-gray-600 rounded text-gray-300 focus:outline-none focus:border-blue-500">
        </div>

        <textarea id="userInput" rows="6" placeholder="Cliente: Hola, ¿cuál es el precio? Me parece caro..." 
        class="w-full p-4 bg-gray-900 border border-gray-700 rounded-lg mb-4 text-white focus:ring-2 focus:ring-blue-500 outline-none"></textarea>

        <button onclick="generarRespuesta()" id="btnEnviar"
        class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg transition duration-300 shadow-lg">
            Generar Respuesta Ganadora
        </button>

        <div id="loading" class="hidden mt-4 text-center text-blue-400 animate-pulse">Analizando la mejor estrategia...</div>
        
        <div id="resultContainer" class="hidden mt-6 p-4 bg-gray-700 rounded-lg border-l-4 border-green-500">
            <p class="text-xs text-green-400 font-bold mb-1">SUGERENCIA DE RESPUESTA:</p>
            <p id="resultText" class="text-gray-100 italic"></p>
            <button onclick="copiarAlPortapapeles()" class="mt-3 text-xs bg-gray-600 px-2 py-1 rounded hover:bg-gray-500">Copiar texto</button>
        </div>
    </div>

    <script>
        async function generarRespuesta() {
            const apiKey = document.getElementById('apiKey').value;
            const input = document.getElementById('userInput').value;
            const btn = document.getElementById('btnEnviar');
            const loading = document.getElementById('loading');
            const resultContainer = document.getElementById('resultContainer');
            const resultText = document.getElementById('resultText');

            if(!apiKey || !input) {
                alert("Por favor, ingresa tu API Key y el mensaje del cliente.");
                return;
            }

            btn.disabled = true;
            loading.classList.remove('hidden');
            resultContainer.classList.add('hidden');

            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "gpt-3.5-turbo", // Puedes cambiarlo a gpt-4o para más calidad
                        messages: [
                            {
                                role: "system", 
                                content: "Eres un experto cerrador de ventas por WhatsApp con 14 años de experiencia en marketing. Tu objetivo es analizar la conversación y dar UNA respuesta corta, persuasiva y que rompa objeciones, lista para copiar y pegar."
                            },
                            {role: "user", content: `Analiza esto y dime qué responder: ${input}`}
                        ]
                    })
                });

                const data = await response.json();
                resultText.innerText = data.choices[0].message.content;
                resultContainer.classList.remove('hidden');
            } catch (error) {
                alert("Error con la API. Revisa tu saldo o la clave.");
            } finally {
                btn.disabled = false;
                loading.classList.add('hidden');
            }
        }

        function copiarAlPortapapeles() {
            const texto = document.getElementById('resultText').innerText;
            navigator.clipboard.writeText(texto);
            alert("¡Copiado!");
        }
    </script>
</body>
</html>
