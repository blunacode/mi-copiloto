<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copiloto de Ventas AI (Groq Edition)</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans min-h-screen flex items-center justify-center p-4">

    <div class="max-w-2xl w-full bg-gray-800 p-8 rounded-2xl shadow-2xl border border-gray-700">
        <h1 class="text-2xl font-bold mb-2 text-green-400">⚡ Copiloto Groq</h1>
        <p class="text-gray-400 mb-6 text-sm">Pega la conversación y obtén la respuesta perfecta al instante.</p>

        <div class="mb-4">
            <input type="password" id="apiKey" placeholder="Pega tu Groq API Key aquí (gsk_...)" 
            class="w-full p-2 text-xs bg-gray-700 border border-gray-600 rounded text-gray-300 focus:outline-none focus:border-green-500">
        </div>

        <textarea id="userInput" rows="6" placeholder="Pega aquí el mensaje del cliente..." 
        class="w-full p-4 bg-gray-900 border border-gray-700 rounded-lg mb-4 text-white focus:ring-2 focus:ring-green-500 outline-none"></textarea>

        <button onclick="generarRespuesta()" id="btnEnviar"
        class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-3 rounded-lg transition duration-300 shadow-lg">
            Generar Respuesta Pro (Gratis)
        </button>

        <div id="loading" class="hidden mt-4 text-center text-green-400 animate-pulse">Groq está pensando a la velocidad de la luz...</div>
        
        <div id="resultContainer" class="hidden mt-6 p-4 bg-gray-700 rounded-lg border-l-4 border-green-500">
            <p class="text-xs text-green-400 font-bold mb-1">SUGERENCIA DE RESPUESTA:</p>
            <p id="resultText" class="text-gray-100 italic"></p>
            <button onclick="copiarAlPortapapeles()" class="mt-3 text-xs bg-gray-600 px-2 py-1 rounded hover:bg-gray-500">Copiar texto</button>
        </div>
    </div>

    <script>
        async function generarRespuesta() {
            const apiKey = document.getElementById('apiKey').value;
            const input = document.getElementById('userInput').value;
            const btn = document.getElementById('btnEnviar');
            const loading = document.getElementById('loading');
            const resultContainer = document.getElementById('resultContainer');
            const resultText = document.getElementById('resultText');

            if(!apiKey || !input) {
                alert("Por favor, ingresa tu API Key de Groq y el mensaje.");
                return;
            }

            btn.disabled = true;
            loading.classList.remove('hidden');
            resultContainer.classList.add('hidden');

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            {
                                role: "system", 
                                content: "Eres un experto cerrador de ventas por WhatsApp con 14 años de experiencia. Responde de forma corta, persuasiva y directa."
                            },
                            {role: "user", content: `Analiza y responde esto: ${input}`}
                        ]
                    })
                });

                const data = await response.json();
                resultText.innerText = data.choices[0].message.content;
                resultContainer.classList.remove('hidden');
            } catch (error) {
                alert("Error con Groq. Revisa tu clave.");
            } finally {
                btn.disabled = false;
                loading.classList.add('hidden');
            }
        }

        function copiarAlPortapapeles() {
            const texto = document.getElementById('resultText').innerText;
            navigator.clipboard.writeText(texto);
            alert("¡Copiado!");
        }
    </script>
</body>
</html>
